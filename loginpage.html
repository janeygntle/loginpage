<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form in HTML and CSS | janeygntle</title>
  <link rel="stylesheet" href="style.css">    
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  
</head>

<body>
   
  <div class="wrapper">
      <h1>WELCOME TO JANEYVERSE!</h1>
    <form action="#">
      <div class="input-box">
        <input type="text" placeholder="Username">
        <i class="bxf bx-user" style="color:#47034E;"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Password">
        <i class="bxf bx-lock" style="color:#47034E;"></i>
      </div>

      <div class="content">
        <div class="checkbox">
          <input type="checkbox" id="remember-me">
          <label for="remember-me">Remember me</label>
        </div>
        <div class="pass-link"><a href="#">Forgot password?</a></div>
      </div>

      <button class="button">Login</button>

      <div class="signup-link">Don't have an account? <a href="#">Signup now</a></div>
    </form> 

  </div>
</body>
</html>
